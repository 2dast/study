name: Naver Weather Crawl & Deploy

on:
  schedule:
    - cron: '0 0,3,6,9,12,15,18,21 * * *'  # 3시간마다 (KST 기준)
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run weather crawler
        run: pnpm crawl

      - name: Commit & Push result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/weather.json "docs/data/$(date -u '+%Y-%m')"
          git diff --cached --quiet || git commit -m "chore: update weather [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
