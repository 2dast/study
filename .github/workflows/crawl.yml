name: Naver Weather Crawl & Deploy

on:
  schedule:
    - cron: '0 0,3,6,9,12,15,18,21 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --ignore-scripts
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Install Chrome
        run: npx puppeteer browsers install chrome

      - name: Run weather crawler
        run: node src/crawl.js

      - name: Commit & Push result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/weather.json "docs/data/$(date -u '+%Y-%m')"
          git diff --cached --quiet || git commit -m "chore: update weather [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
