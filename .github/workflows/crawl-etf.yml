name: ACE ETF Crawl & Deploy

on:
  schedule:
    - cron: '0 1 * * *'   # 매일 KST 10:00 (UTC 01:00)
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run ETF crawler
        run: node src/crawl-etf.js

      - name: Commit & Push result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/etf/
          git diff --cached --quiet || git commit -m "chore: update ETF data [$(date -u '+%Y-%m-%d')]"
          git push
