<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ACE ETF 종목리스트</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <header class="bg-white border-b sticky top-0 z-10 px-4 py-3 flex items-center gap-3">
    <a href="index.html" class="text-gray-400 hover:text-gray-600 text-sm">← 날씨</a>
    <h1 class="text-lg font-bold text-gray-800 flex-1">ACE ETF 종목리스트</h1>
    <span id="updated" class="text-xs text-gray-400"></span>
  </header>

  <!-- 검색 + 필터 -->
  <div class="max-w-5xl mx-auto px-4 py-4 flex gap-2 flex-wrap">
    <input id="search" type="text" placeholder="ETF명 검색..."
      class="border rounded-lg px-3 py-2 text-sm flex-1 min-w-48 focus:outline-none focus:ring-2 focus:ring-blue-300" />
    <select id="type-filter" class="border rounded-lg px-3 py-2 text-sm focus:outline-none">
      <option value="">전체 유형</option>
      <option value="주식">주식</option>
      <option value="채권">채권</option>
      <option value="리츠">리츠</option>
      <option value="원자재">원자재</option>
      <option value="혼합">혼합</option>
    </select>
    <span id="count" class="self-center text-sm text-gray-400"></span>
  </div>

  <!-- ETF 목록 -->
  <main class="max-w-5xl mx-auto px-4 pb-8">
    <div id="loading" class="text-center text-gray-400 py-16">불러오는 중...</div>
    <div id="error" class="hidden text-center text-red-400 py-16"></div>
    <div id="fund-list" class="hidden space-y-2"></div>
  </main>

  <!-- 구성종목 모달 -->
  <div id="modal" class="hidden fixed inset-0 bg-black/40 z-20 flex items-end md:items-center justify-center p-4">
    <div class="bg-white rounded-2xl w-full max-w-2xl max-h-[80vh] flex flex-col shadow-2xl">
      <div class="flex items-center justify-between px-5 py-4 border-b">
        <div>
          <h2 id="modal-title" class="font-bold text-gray-800"></h2>
          <p id="modal-date" class="text-xs text-gray-400 mt-0.5"></p>
        </div>
        <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
      </div>
      <div id="modal-body" class="overflow-y-auto p-5 flex-1">
        <div class="text-center text-gray-400 py-8">불러오는 중...</div>
      </div>
    </div>
  </div>

  <script src="etf.js"></script>
</body>
</html>
