<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>대시보드</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
  <style>
    #sidebar { width: 220px; min-width: 220px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-radius: 10px; cursor: pointer; font-size: 0.9rem; color: #94a3b8; transition: background 0.15s, color 0.15s; }
    .nav-item:hover { background: rgba(255,255,255,0.07); color: #e2e8f0; }
    .nav-item.active { background: rgba(255,255,255,0.13); color: #fff; font-weight: 600; }
    .section { display: none !important; }
    .section.active { display: block !important; }
    #section-ace-etf.active, #section-all-etf.active { display: flex !important; flex-direction: column; }
    /* 모바일 하단 탭바 */
    .nav-mobile { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 6px 0 8px; gap: 2px; color: #64748b; background: none; border: none; cursor: pointer; transition: color 0.15s; }
    .nav-mobile.active { color: #fff; }
    .nav-mobile .tab-label { font-size: 10px; line-height: 1; }
    @media (max-width: 767px) {
      #section-ace-etf, #section-all-etf { height: calc(100dvh - 104px) !important; }
      /* ETF 목록 모바일 전체 폭 */
      #section-ace-etf .etf-list-panel { width: 100% !important; }
      /* 홀딩스 패널: 모바일에서 전체화면 오버레이 */
      #holdings-panel.visible {
        position: fixed !important;
        top: 48px; left: 0; right: 0; bottom: 56px;
        z-index: 40;
        background: #0f172a;
        overflow-y: auto;
        width: 100% !important;
        flex: none !important;
        border-left: none !important;
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body class="bg-[#0f172a] min-h-screen flex flex-col md:flex-row text-white">

  <!-- 모바일 상단 헤더 -->
  <header class="md:hidden sticky top-0 z-30 bg-[#1e293b] border-b border-white/5 px-4 flex items-center shrink-0" style="height:48px">
    <span class="text-xs text-slate-500 uppercase tracking-widest font-semibold mr-2">Dashboard</span>
    <span class="text-sm font-bold flex-1" id="mobile-title">날씨</span>
  </header>

  <!-- 사이드바 (데스크톱) -->
  <aside id="sidebar" class="hidden md:flex flex-col bg-[#1e293b] border-r border-white/5 py-6 px-3 shrink-0">
    <div class="px-3 mb-8">
      <p class="text-xs text-slate-500 uppercase tracking-widest font-semibold">Dashboard</p>
    </div>

    <nav class="flex flex-col gap-1">
      <div class="nav-item active" data-section="weather">
        <span class="text-lg">🌤️</span> 날씨
      </div>
      <div class="nav-item" data-section="ace-etf">
        <span class="text-lg">📊</span> ACE ETF
      </div>
      <div class="nav-item" data-section="all-etf">
        <span class="text-lg">🗂️</span> 전체 ETF
      </div>
    </nav>
  </aside>

  <!-- 메인 컨텐츠 -->
  <main class="flex-1 overflow-y-auto min-h-0">

    <!-- ── 날씨 섹션 ── -->
    <div id="section-weather" class="section active weather-bg min-h-screen p-6 md:p-10 pb-20 md:pb-10">
      <div class="max-w-xl mx-auto space-y-5">
        <div id="loading" class="text-center text-white/60 py-16">날씨 정보를 불러오는 중...</div>
        <div id="error" class="hidden text-center text-white/60 py-16"></div>

        <div id="weather-card" class="hidden glass rounded-3xl p-6 text-white shadow-2xl">
          <div class="flex justify-between items-start mb-4">
            <div>
              <h1 id="location" class="text-xl font-bold">--</h1>
              <p id="condition" class="text-white/70 text-sm mt-0.5">--</p>
            </div>
            <div id="weather-icon" class="text-5xl leading-none">🌤️</div>
          </div>
          <div class="text-center my-5">
            <div class="text-8xl font-thin tracking-tighter" id="temp">--</div>
            <div class="text-white/60 text-sm mt-1">체감 <span id="feels-like">--</span>°</div>
          </div>
          <div class="grid grid-cols-2 gap-2 mb-5">
            <div class="detail-box"><span class="label">습도</span><span class="value" id="humidity">--%</span></div>
            <div class="detail-box"><span class="label">풍속</span><span class="value" id="wind">-- m/s</span></div>
          </div>
          <div id="forecast" class="space-y-2"></div>
          <p class="text-center text-white/40 text-xs mt-5" id="updated"></p>
        </div>

        <div id="history-section" class="hidden glass rounded-3xl p-6 text-white shadow-2xl">
          <h2 class="font-semibold text-lg mb-4">오늘의 기록 <span id="history-date" class="text-white/50 text-sm font-normal ml-1"></span></h2>
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead>
                <tr class="border-b border-white/20 text-white/60 text-left">
                  <th class="pb-2 pr-4">시각</th><th class="pb-2 pr-4">기온</th><th class="pb-2 pr-4">체감</th>
                  <th class="pb-2 pr-4">날씨</th><th class="pb-2 pr-4">습도</th><th class="pb-2">풍속</th>
                </tr>
              </thead>
              <tbody id="history-body" class="divide-y divide-white/10"></tbody>
            </table>
          </div>
          <p id="history-empty" class="hidden text-center text-white/40 py-4 text-sm">오늘 기록이 없습니다.</p>
        </div>
      </div>
    </div>

    <!-- ── ACE ETF 섹션 ── -->
    <div id="section-ace-etf" class="section bg-[#0f172a] flex flex-col" style="height:100vh;">

      <!-- 헤더 -->
      <div class="shrink-0 bg-[#0f172a]/95 backdrop-blur border-b border-white/5 px-6 py-3 flex items-center gap-3">
        <h1 class="text-base font-bold flex-1">ACE ETF 종목리스트</h1>
        <span id="etf-updated" class="text-xs text-slate-500"></span>
      </div>

      <!-- 검색 바 -->
      <div class="shrink-0 px-6 py-3 flex gap-2 flex-wrap border-b border-white/5">
        <input id="etf-search" type="text" placeholder="ETF명 검색..."
          class="bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-sm flex-1 min-w-48 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/40" />
        <select id="etf-type" class="bg-slate-800 border border-white/10 rounded-lg px-3 py-2 text-sm text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500/40">
          <option value="">전체 유형</option>
          <option value="주식">주식</option>
          <option value="채권">채권</option>
          <option value="리츠">리츠</option>
          <option value="원자재">원자재</option>
          <option value="혼합">혼합</option>
        </select>
        <span id="etf-count" class="self-center text-sm text-slate-500"></span>
      </div>

      <!-- 2컬럼 본문 -->
      <div class="flex flex-1 overflow-hidden">

        <!-- 왼쪽: ETF 목록 -->
        <div class="etf-list-panel w-full md:w-80 shrink-0 overflow-y-auto border-r border-white/5 p-3 space-y-1">
          <div id="etf-loading" class="text-center text-slate-500 py-16 text-sm">불러오는 중...</div>
          <div id="etf-error" class="hidden text-center text-red-400 py-16 text-sm"></div>
          <div id="etf-list" class="hidden space-y-1"></div>
        </div>

        <!-- 오른쪽: 구성종목 -->
        <div id="holdings-panel" class="flex-1 overflow-y-auto p-6 border-l border-white/5" style="display:none">
          <div id="holdings-loading" class="hidden flex items-center justify-center h-32 text-slate-500 text-sm">
            불러오는 중...
          </div>
          <div id="holdings-content" class="hidden">
            <div class="flex items-start justify-between mb-4">
              <div>
                <h2 id="holdings-title" class="text-lg font-bold text-white"></h2>
                <p id="holdings-date" class="text-xs text-slate-500 mt-0.5"></p>
              </div>
              <button id="holdings-close" onclick="closeHoldings()" class="text-slate-500 hover:text-white text-2xl leading-none ml-4 px-1 shrink-0" title="닫기">&times;</button>
            </div>
            <table class="w-full text-sm">
              <thead>
                <tr class="text-left text-slate-500 border-b border-white/10 text-xs">
                  <th class="pb-2 pr-3 w-8">#</th>
                  <th class="pb-2 pr-4">종목명</th>
                  <th class="pb-2 pr-4">티커</th>
                  <th class="pb-2 text-right">비중</th>
                </tr>
              </thead>
              <tbody id="holdings-body" class="divide-y divide-white/5"></tbody>
            </table>
          </div>
        </div>

      </div>
    </div>

    <!-- ── 전체 ETF 섹션 ── -->
    <div id="section-all-etf" class="section bg-[#0f172a] flex flex-col" style="height:100vh;">

      <!-- 헤더 -->
      <div class="shrink-0 bg-[#0f172a]/95 backdrop-blur border-b border-white/5 px-6 py-3 flex items-center gap-3">
        <h1 class="text-base font-bold flex-1">전체 ETF 시세</h1>
        <span id="netf-updated" class="text-xs text-slate-500"></span>
        <span id="netf-count" class="text-xs text-slate-400 font-medium"></span>
      </div>

      <!-- 필터 바 -->
      <div class="shrink-0 px-6 py-3 flex gap-2 flex-wrap items-center border-b border-white/5">
        <input id="netf-search" type="text" placeholder="ETF명 또는 코드 검색..."
          class="bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-sm flex-1 min-w-52 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/40" />
        <select id="netf-sort" class="bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-sm text-white focus:outline-none">
          <option value="name">이름순</option>
          <option value="changeRate_desc">등락률 ↓</option>
          <option value="changeRate_asc">등락률 ↑</option>
          <option value="return3m_desc">3개월수익 ↓</option>
          <option value="return3m_asc">3개월수익 ↑</option>
          <option value="aum_desc">자산 큰 순</option>
          <option value="volume_desc">거래량 많은 순</option>
        </select>
        <!-- 이력 조회 -->
        <select id="netf-month" class="bg-white/5 border border-white/10 rounded-lg px-2 py-2 text-sm text-white focus:outline-none">
          <option value="">-- 월 --</option>
        </select>
        <select id="netf-date" class="bg-white/5 border border-white/10 rounded-lg px-2 py-2 text-sm text-white focus:outline-none" disabled>
          <option value="">-- 날짜 --</option>
        </select>
        <button id="netf-load-history" class="px-3 py-2 bg-blue-600/20 text-blue-400 rounded-lg hover:bg-blue-600/30 disabled:opacity-40 text-sm" disabled>조회</button>
        <button id="netf-clear-history" class="hidden px-3 py-2 bg-white/5 text-slate-400 rounded-lg hover:bg-white/10 text-sm">최신으로</button>
      </div>

      <!-- 테이블 -->
      <div class="flex-1 overflow-auto px-4 md:px-6 py-4">
        <div id="netf-loading" class="text-center text-slate-500 py-20 text-sm">불러오는 중...</div>
        <div id="netf-error" class="hidden text-center text-red-400 py-20 text-sm"></div>
        <div id="netf-table-wrap" class="hidden overflow-x-auto">
          <table class="w-full text-sm min-w-[600px]">
            <thead class="sticky top-0 bg-[#0f172a]">
              <tr class="text-left text-slate-500 border-b border-white/10 text-xs">
                <th class="pb-2 pr-4 font-medium">종목명</th>
                <th class="pb-2 pr-3 font-medium text-right cursor-pointer hover:text-slate-300" data-netf-sort="price">현재가</th>
                <th class="pb-2 pr-3 font-medium text-right cursor-pointer hover:text-slate-300" data-netf-sort="changeRate">등락률</th>
                <th class="pb-2 pr-3 font-medium text-right cursor-pointer hover:text-slate-300" data-netf-sort="nav">NAV</th>
                <th class="pb-2 pr-3 font-medium text-right cursor-pointer hover:text-slate-300" data-netf-sort="return3m">3개월수익</th>
                <th class="pb-2 pr-3 font-medium text-right cursor-pointer hover:text-slate-300" data-netf-sort="volume">거래량</th>
                <th class="pb-2 font-medium text-right cursor-pointer hover:text-slate-300" data-netf-sort="aum">자산총계</th>
              </tr>
            </thead>
            <tbody id="netf-tbody" class="divide-y divide-white/5"></tbody>
          </table>
        </div>
      </div>
    </div>

  </main>

  <!-- 모바일 하단 탭바 -->
  <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-[#1e293b] border-t border-white/5 flex z-50" style="height:56px">
    <button class="nav-mobile active" data-section="weather">
      <span class="text-xl">🌤️</span>
      <span class="tab-label">날씨</span>
    </button>
    <button class="nav-mobile" data-section="ace-etf">
      <span class="text-xl">📊</span>
      <span class="tab-label">ACE ETF</span>
    </button>
    <button class="nav-mobile" data-section="all-etf">
      <span class="text-xl">🗂️</span>
      <span class="tab-label">전체 ETF</span>
    </button>
  </nav>

  <script src="main.js"></script>
  <script src="etf.js"></script>
  <script src="naver-etf-section.js"></script>
  <script>
    const sectionTitles = { weather: '날씨', 'ace-etf': 'ACE ETF', 'all-etf': '전체 ETF' };

    function switchSection(target) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById(`section-${target}`).classList.add('active');

      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      const desktopNav = document.querySelector(`.nav-item[data-section="${target}"]`);
      if (desktopNav) desktopNav.classList.add('active');

      document.querySelectorAll('.nav-mobile').forEach(n => n.classList.remove('active'));
      const mobileNav = document.querySelector(`.nav-mobile[data-section="${target}"]`);
      if (mobileNav) mobileNav.classList.add('active');

      const mobileTitle = document.getElementById('mobile-title');
      if (mobileTitle) mobileTitle.textContent = sectionTitles[target] || '';
    }

    // ── 사이드바 네비게이션 ──
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => switchSection(item.dataset.section));
    });

    // ── 모바일 하단 탭바 ──
    document.querySelectorAll('.nav-mobile').forEach(item => {
      item.addEventListener('click', () => switchSection(item.dataset.section));
    });

    // ── URL 해시로 초기 섹션 결정 ──
    const hash = location.hash.replace('#', '');
    if (hash) switchSection(hash);
  </script>
</body>
</html>
