<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>네이버 날씨</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="weather-bg min-h-screen p-4 md:p-8">

  <div class="max-w-2xl mx-auto space-y-5">

    <!-- 현재 날씨 카드 -->
    <div id="loading" class="text-center text-white/80 py-16 text-lg">날씨 정보를 불러오는 중...</div>
    <div id="error" class="hidden text-center text-white/80 py-16"></div>

    <div id="weather-card" class="hidden glass rounded-3xl p-6 text-white shadow-2xl">
      <div class="flex justify-between items-start mb-4">
        <div>
          <h1 id="location" class="text-xl font-bold tracking-wide">--</h1>
          <p id="condition" class="text-white/70 text-sm mt-0.5">--</p>
        </div>
        <div id="weather-icon" class="text-5xl leading-none">🌤️</div>
      </div>

      <div class="text-center my-5">
        <div class="text-8xl font-thin tracking-tighter" id="temp">--</div>
        <div class="text-white/60 text-sm mt-1">체감 <span id="feels-like">--</span>°</div>
      </div>

      <div class="grid grid-cols-2 gap-2 mb-5">
        <div class="detail-box">
          <span class="label">습도</span>
          <span class="value" id="humidity">--%</span>
        </div>
        <div class="detail-box">
          <span class="label">풍속</span>
          <span class="value" id="wind">-- m/s</span>
        </div>
      </div>

      <!-- 주간 예보 -->
      <div id="forecast" class="space-y-2"></div>

      <p class="text-center text-white/40 text-xs mt-5" id="updated"></p>
    </div>

    <!-- 오늘 시간별 기록 테이블 -->
    <div id="history-section" class="hidden glass rounded-3xl p-6 text-white shadow-2xl">
      <h2 class="font-semibold text-lg mb-4">오늘의 기록 <span id="history-date" class="text-white/50 text-sm font-normal ml-1"></span></h2>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-white/20 text-white/60 text-left">
              <th class="pb-2 pr-4">시각</th>
              <th class="pb-2 pr-4">기온</th>
              <th class="pb-2 pr-4">체감</th>
              <th class="pb-2 pr-4">날씨</th>
              <th class="pb-2 pr-4">습도</th>
              <th class="pb-2">풍속</th>
            </tr>
          </thead>
          <tbody id="history-body" class="divide-y divide-white/10"></tbody>
        </table>
      </div>
      <p id="history-empty" class="hidden text-center text-white/40 py-4 text-sm">오늘 기록이 없습니다.</p>
    </div>

  </div>

  <script src="main.js"></script>
</body>
</html>
