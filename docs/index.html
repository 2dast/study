<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>네이버 날씨</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="min-h-screen flex items-center justify-center p-4 weather-bg">

  <div class="max-w-sm w-full">

    <div id="loading" class="text-center text-white/80 py-16 text-lg">
      날씨 정보를 불러오는 중...
    </div>

    <div id="error" class="hidden text-center text-white/80 py-16"></div>

    <div id="weather-card" class="hidden glass rounded-3xl p-6 text-white shadow-2xl">

      <!-- 헤더: 위치 + 아이콘 -->
      <div class="flex justify-between items-start mb-4">
        <div>
          <h1 id="location" class="text-xl font-bold tracking-wide">--</h1>
          <p id="condition" class="text-white/70 text-sm mt-0.5">--</p>
        </div>
        <div id="weather-icon" class="text-5xl leading-none">🌤️</div>
      </div>

      <!-- 현재 기온 -->
      <div class="text-center my-6">
        <div class="text-8xl font-thin tracking-tighter" id="temp">--</div>
        <div class="text-white/60 text-sm mt-1">체감 <span id="feels-like">--</span>°</div>
      </div>

      <!-- 상세 정보 -->
      <div class="grid grid-cols-2 gap-2 mb-5">
        <div class="detail-box">
          <span class="label">습도</span>
          <span class="value" id="humidity">--%</span>
        </div>
        <div class="detail-box">
          <span class="label">풍속</span>
          <span class="value" id="wind">-- m/s</span>
        </div>
      </div>

      <!-- 주간 예보 -->
      <div id="forecast" class="space-y-2"></div>

      <!-- 업데이트 시각 -->
      <p class="text-center text-white/40 text-xs mt-5" id="updated"></p>

    </div>

  </div>

  <script src="main.js"></script>
</body>
</html>
