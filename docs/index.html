<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>크롤링 결과</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-gray-50 min-h-screen">
  <header class="bg-white shadow-sm py-4 px-6">
    <h1 class="text-2xl font-bold text-gray-800">크롤링 결과</h1>
    <p id="last-updated" class="text-sm text-gray-400 mt-1"></p>
  </header>

  <main class="max-w-4xl mx-auto px-6 py-8">
    <div id="loading" class="text-center text-gray-400 py-16">불러오는 중...</div>
    <div id="error" class="hidden text-center text-red-500 py-16"></div>
    <ul id="result-list" class="hidden space-y-3"></ul>
  </main>

  <script src="main.js"></script>
</body>
</html>
